name: CI/CD

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install Poetry
        run: pipx install poetry

      - name: Install dependencies
        run: poetry install

      - name: Run tests
        run: poetry run python -m unittest discover -s tests -v

      - name: Compile check
        run: poetry run python -m compileall -q archershub tests

  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: test
    runs-on: ubuntu-latest

    permissions:
      contents: read
      id-token: write

    steps:
      - name: Connect to Tailscale
        uses: tailscale/github-action@v3
        with:
          oauth-client-id: ${{ secrets.TS_OAUTH_CLIENT_ID }}
          oauth-secret: ${{ secrets.TS_OAUTH_SECRET }}
          tags: tag:ci

      - name: Deploy to Raspberry Pi
        run: |
          ssh -o StrictHostKeyChecking=accept-new -o BatchMode=yes "armaine@${{ secrets.PI_HOST }}" <<'EOF'
          set -euo pipefail
          cd /home/armaine/archershub-auto-switch
          git fetch origin main
          git reset --hard origin/main
          poetry install --only main --no-interaction
          sudo -n systemctl restart archershub-bot
          sleep 3
          sudo -n systemctl is-active --quiet archershub-bot
          EOF
